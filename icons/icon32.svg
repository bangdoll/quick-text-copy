<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient32" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="copyGradient32" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#F0F8FF;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- 背景圓形 -->
  <circle cx="16" cy="16" r="14" 
          fill="url(#bgGradient32)" stroke="#2C5282" stroke-width="2"/>
  
  <!-- 文件/頁面圖示 (背景) -->
  <rect x="4.8" y="8" 
        width="11.2" height="16" 
        fill="url(#copyGradient32)" stroke="#2C5282" stroke-width="1.6" 
        rx="0.96"/>
  
  <!-- 複製的文件 (前景) -->
  <rect x="8" y="4.8" 
        width="11.2" height="16" 
        fill="url(#copyGradient32)" stroke="#2C5282" stroke-width="1.6" 
        rx="0.96"/>
  
  <!-- 文字線條 -->
  <line x1="9.6" y1="8.96" 
        x2="16.64" y2="8.96" 
        stroke="#4A90E2" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="9.6" y1="12.16" 
        x2="17.6" y2="12.16" 
        stroke="#4A90E2" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="9.6" y1="15.36" 
        x2="16" y2="15.36" 
        stroke="#4A90E2" stroke-width="1.6" stroke-linecap="round"/>
  
  <!-- 複製箭頭/指示器 -->
  <path d="M 21.76 23.04 
           L 24.96 24.64 
           L 21.76 26.24 
           Z" 
        fill="#FFFFFF" stroke="#2C5282" stroke-width="1.2"/>
  
  <!-- 小的 "C" 字母表示複製 (Copy) -->
  <text x="23.36" y="28.8" 
        font-family="Arial, sans-serif" font-size="8" 
        font-weight="bold" fill="#FFFFFF" text-anchor="middle">C</text>
</svg>