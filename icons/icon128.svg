<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="copyGradient128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#F0F8FF;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- 背景圓形 -->
  <circle cx="64" cy="64" r="56" 
          fill="url(#bgGradient128)" stroke="#2C5282" stroke-width="8"/>
  
  <!-- 文件/頁面圖示 (背景) -->
  <rect x="19.2" y="32" 
        width="44.8" height="64" 
        fill="url(#copyGradient128)" stroke="#2C5282" stroke-width="6.4" 
        rx="3.84"/>
  
  <!-- 複製的文件 (前景) -->
  <rect x="32" y="19.2" 
        width="44.8" height="64" 
        fill="url(#copyGradient128)" stroke="#2C5282" stroke-width="6.4" 
        rx="3.84"/>
  
  <!-- 文字線條 -->
  <line x1="38.4" y1="35.84" 
        x2="66.56" y2="35.84" 
        stroke="#4A90E2" stroke-width="6.4" stroke-linecap="round"/>
  <line x1="38.4" y1="48.64" 
        x2="70.4" y2="48.64" 
        stroke="#4A90E2" stroke-width="6.4" stroke-linecap="round"/>
  <line x1="38.4" y1="61.44" 
        x2="64" y2="61.44" 
        stroke="#4A90E2" stroke-width="6.4" stroke-linecap="round"/>
  
  <!-- 複製箭頭/指示器 -->
  <path d="M 87.04 92.16 
           L 99.84 98.56 
           L 87.04 104.96 
           Z" 
        fill="#FFFFFF" stroke="#2C5282" stroke-width="4.8"/>
  
  <!-- 小的 "C" 字母表示複製 (Copy) -->
  <text x="93.44" y="115.2" 
        font-family="Arial, sans-serif" font-size="21.333333333333332" 
        font-weight="bold" fill="#FFFFFF" text-anchor="middle">C</text>
</svg>