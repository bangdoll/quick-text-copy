<!DOCTYPE html>
<html>
<head>
    <title>圖示產生器</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        canvas { border: 1px solid #ccc; margin: 10px; }
        .icon-container { display: inline-block; margin: 10px; text-align: center; }
        button { padding: 10px 20px; margin: 5px; background: #4A90E2; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #357ABD; }
    </style>
</head>
<body>
    <h1>Quick Text Copy 圖示產生器</h1>
    <p>點擊下方按鈕產生並下載圖示檔案</p>
    
    <div id="icons-container"></div>
    
    <script>
        // 建立圖示的函數
        function createIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // 背景圓形
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#4A90E2');
            gradient.addColorStop(1, '#357ABD');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/2 - 2, 0, 2 * Math.PI);
            ctx.fill();
            
            // 邊框
            ctx.strokeStyle = '#2C5282';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 後面的文件
            ctx.fillStyle = 'white';
            ctx.fillRect(size * 0.25, size * 0.25, size * 0.35, size * 0.5);
            ctx.strokeStyle = '#CBD5E0';
            ctx.lineWidth = 1;
            ctx.strokeRect(size * 0.25, size * 0.25, size * 0.35, size * 0.5);
            
            // 前面的文件
            ctx.fillStyle = 'white';
            ctx.fillRect(size * 0.4, size * 0.15, size * 0.35, size * 0.5);
            ctx.strokeStyle = '#4A90E2';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(size * 0.4, size * 0.15, size * 0.35, size * 0.5);
            
            // 文字線條
            ctx.strokeStyle = '#4A90E2';
            ctx.lineWidth = Math.max(1, size / 32);
            ctx.lineCap = 'round';
            
            // 第一行
            ctx.beginPath();
            ctx.moveTo(size * 0.45, size * 0.3);
            ctx.lineTo(size * 0.7, size * 0.3);
            ctx.stroke();
            
            // 第二行
            ctx.beginPath();
            ctx.moveTo(size * 0.45, size * 0.4);
            ctx.lineTo(size * 0.65, size * 0.4);
            ctx.stroke();
            
            // 第三行
            ctx.beginPath();
            ctx.moveTo(size * 0.45, size * 0.5);
            ctx.lineTo(size * 0.7, size * 0.5);
            ctx.stroke();
            
            // 複製箭頭
            ctx.fillStyle = 'white';
            ctx.strokeStyle = '#2C5282';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(size * 0.15, size * 0.45);
            ctx.lineTo(size * 0.25, size * 0.4);
            ctx.lineTo(size * 0.25, size * 0.5);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            return canvas;
        }
        
        // 下載圖示的函數
        function downloadIcon(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        // 建立所有尺寸的圖示
        const sizes = [16, 32, 48, 128];
        const container = document.getElementById('icons-container');
        
        sizes.forEach(size => {
            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            
            const canvas = createIcon(size);
            const button = document.createElement('button');
            button.textContent = `下載 ${size}x${size}`;
            button.onclick = () => downloadIcon(canvas, `icon${size}.png`);
            
            const label = document.createElement('div');
            label.textContent = `${size}x${size}`;
            
            iconContainer.appendChild(canvas);
            iconContainer.appendChild(document.createElement('br'));
            iconContainer.appendChild(button);
            iconContainer.appendChild(document.createElement('br'));
            iconContainer.appendChild(label);
            
            container.appendChild(iconContainer);
        });
        
        // 全部下載按鈕
        const downloadAllButton = document.createElement('button');
        downloadAllButton.textContent = '下載全部圖示';
        downloadAllButton.style.fontSize = '16px';
        downloadAllButton.style.padding = '15px 30px';
        downloadAllButton.onclick = () => {
            sizes.forEach(size => {
                setTimeout(() => {
                    const canvas = createIcon(size);
                    downloadIcon(canvas, `icon${size}.png`);
                }, size); // 延遲下載避免瀏覽器阻擋
            });
        };
        
        document.body.appendChild(document.createElement('br'));
        document.body.appendChild(downloadAllButton);
        
        console.log('圖示產生器已載入完成');
    </script>
</body>
</html>
