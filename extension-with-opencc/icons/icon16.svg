<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient16" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="copyGradient16" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#F0F8FF;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- 背景圓形 -->
  <circle cx="8" cy="8" r="7" 
          fill="url(#bgGradient16)" stroke="#2C5282" stroke-width="1"/>
  
  <!-- 文件/頁面圖示 (背景) -->
  <rect x="2.4" y="4" 
        width="5.6" height="8" 
        fill="url(#copyGradient16)" stroke="#2C5282" stroke-width="0.8" 
        rx="0.48"/>
  
  <!-- 複製的文件 (前景) -->
  <rect x="4" y="2.4" 
        width="5.6" height="8" 
        fill="url(#copyGradient16)" stroke="#2C5282" stroke-width="0.8" 
        rx="0.48"/>
  
  <!-- 文字線條 -->
  <line x1="4.8" y1="4.48" 
        x2="8.32" y2="4.48" 
        stroke="#4A90E2" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="4.8" y1="6.08" 
        x2="8.8" y2="6.08" 
        stroke="#4A90E2" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="4.8" y1="7.68" 
        x2="8" y2="7.68" 
        stroke="#4A90E2" stroke-width="0.8" stroke-linecap="round"/>
  
  <!-- 複製箭頭/指示器 -->
  <path d="M 10.88 11.52 
           L 12.48 12.32 
           L 10.88 13.12 
           Z" 
        fill="#FFFFFF" stroke="#2C5282" stroke-width="0.6"/>
  
  <!-- 小的 "C" 字母表示複製 (Copy) -->
  <text x="11.68" y="14.4" 
        font-family="Arial, sans-serif" font-size="8" 
        font-weight="bold" fill="#FFFFFF" text-anchor="middle">C</text>
</svg>