<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCC 瀏覽器版本測試</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .test-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 4px solid #007cba;
        }
        .input-text {
            color: #666;
            font-weight: bold;
        }
        .output-text {
            color: #007cba;
            font-weight: bold;
            margin-top: 5px;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        button {
            background: #007cba;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #005a87;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <h1>🔄 OpenCC 瀏覽器版本測試</h1>
    
    <div class="container">
        <h2>📊 轉換器狀態</h2>
        <div id="status" class="status">正在初始化...</div>
    </div>

    <div class="container">
        <h2>🧪 預設測試案例</h2>
        <button onclick="runTests()">執行測試</button>
        <div id="test-results"></div>
    </div>

    <div class="container">
        <h2>✏️ 自訂測試</h2>
        <textarea id="custom-input" placeholder="請輸入要轉換的簡體中文...">这个软件很好用，计算机程序开发需要数据处理和网络功能。</textarea>
        <br>
        <button onclick="convertCustomText()">轉換</button>
        <button onclick="smartConvertCustomText()">智慧轉換</button>
        <div id="custom-result"></div>
    </div>

    <script src="opencc-browser.js"></script>
    <script>
        let openccConverter;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            openccConverter = new OpenCCBrowser();
            
            // 等待初始化完成
            setTimeout(() => {
                updateStatus();
            }, 100);
        });

        function updateStatus() {
            const statusDiv = document.getElementById('status');
            const status = openccConverter.getStatus();
            
            if (status.isReady) {
                statusDiv.className = 'status success';
                statusDiv.innerHTML = `
                    ✅ OpenCC 瀏覽器版本已就緒<br>
                    類型: ${status.type}<br>
                    描述: ${status.description}
                `;
            } else {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ OpenCC 初始化失敗';
            }
        }

        function runTests() {
            const testCases = [
                {
                    name: '基本詞彙轉換',
                    input: '这个软件很好用'
                },
                {
                    name: '科技詞彙轉換',
                    input: '计算机程序开发'
                },
                {
                    name: '長句轉換',
                    input: '我们正在开发一个新的网络应用程序，它可以帮助用户更好地管理他们的数据。'
                },
                {
                    name: '混合文字',
                    input: '这是一个English和中文混合的sentence。'
                },
                {
                    name: '數字和符號',
                    input: '版本1.0.4已经发布了！'
                },
                {
                    name: '繁體文字（不應改變）',
                    input: '這個軟體很好用'
                }
            ];

            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '';

            testCases.forEach((testCase, index) => {
                const result = openccConverter.convert(testCase.input);
                const hasSimplified = openccConverter.hasSimplifiedChinese(testCase.input);
                const smartResult = openccConverter.smartConvert(testCase.input);
                
                const testDiv = document.createElement('div');
                testDiv.className = 'test-item';
                testDiv.innerHTML = `
                    <strong>${testCase.name}</strong><br>
                    <div class="input-text">輸入: ${testCase.input}</div>
                    <div class="output-text">轉換: ${result}</div>
                    <div class="output-text">智慧轉換: ${smartResult}</div>
                    <small>包含簡體字: ${hasSimplified ? '是' : '否'}</small>
                `;
                
                resultsDiv.appendChild(testDiv);
            });
        }

        function convertCustomText() {
            const input = document.getElementById('custom-input').value;
            const result = openccConverter.convert(input);
            
            document.getElementById('custom-result').innerHTML = `
                <div class="test-item">
                    <strong>轉換結果</strong><br>
                    <div class="input-text">原文: ${input}</div>
                    <div class="output-text">轉換: ${result}</div>
                </div>
            `;
        }

        function smartConvertCustomText() {
            const input = document.getElementById('custom-input').value;
            const hasSimplified = openccConverter.hasSimplifiedChinese(input);
            const result = openccConverter.smartConvert(input);
            
            document.getElementById('custom-result').innerHTML = `
                <div class="test-item">
                    <strong>智慧轉換結果</strong><br>
                    <div class="input-text">原文: ${input}</div>
                    <div class="output-text">轉換: ${result}</div>
                    <small>檢測到簡體字: ${hasSimplified ? '是' : '否'}</small><br>
                    <small>${hasSimplified ? '已執行轉換' : '無需轉換，保持原文'}</small>
                </div>
            `;
        }
    </script>
</body>
</html>
