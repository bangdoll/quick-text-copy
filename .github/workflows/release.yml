name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: |
        npm test
        npm run test-opencc
        npm run verify-opencc
    
    - name: Build extension
      run: npm run build-clean
    
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          ## Changes in this Release
          
          Please see [CHANGELOG.md](CHANGELOG.md) for detailed changes.
          
          ## Download
          
          - Download the extension package: `quick-text-copy-clean.zip`
          - Install from Chrome Web Store: [Link](https://chrome.google.com/webstore)
          
          ## Features
          
          - 📋 Quick text copy functionality
          - 🔄 OpenCC Simplified to Traditional Chinese conversion
          - 🧠 Smart conversion with automatic detection
          - 📦 Batch processing support
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./quick-text-copy-clean.zip
        asset_name: quick-text-copy-clean-${{ steps.get_version.outputs.VERSION }}.zip
        asset_content_type: application/zip